<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lightning Horn Unicorn</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: system-ui, sans-serif;
  color: white;
}

/* MATRIX */
#matrix-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* 3D */
#container3D {
  position: relative;
  width: 100%;
  height: 100vh;
  z-index: 1;
}
#container3D canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* LOADING */
#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  font-size: 20px;
  letter-spacing: 2px;
  pointer-events: none;
}

/* ANIMATED RAINBOW BORDER (pseudo-element based, stable during GLB load) */
@keyframes edgeHue {
  from { filter: hue-rotate(0deg); }
  to   { filter: hue-rotate(360deg); }
}
.btn {
  position: relative;
  background: rgba(0,0,0,0.55);
  color: #fff;
  padding: 12px 22px;
  font-size: clamp(13px, 3.5vw, 16px);
  cursor: pointer;
  border: none;
  border-radius: 10px;
  -webkit-tap-highlight-color: transparent;
}
.btn::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 10px;
  padding: 2px;
  background: conic-gradient(from 0deg, #ff0033, #ffaa00, #00ff88, #0066ff, #ff00aa, #ff0033);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  animation: edgeHue 6s linear infinite;
  pointer-events: none;
}

/* TOP UI */
#ui-wrapper {
  position: absolute;
  top: max(14px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 92vw;
  z-index: 10;
}

/* BOTTOM MENU */
#head-menu {
  position: fixed;
  bottom: max(14px, env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  width: 92vw;
  display: flex;
  justify-content: center;
}

.btn-edge {
  position: relative;
  width: 100%;
  max-width: 420px;
  border-radius: 10px;
}
.btn-edge::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 10px;
  padding: 2px;
  background: conic-gradient(from 0deg, #ff0033, #ffaa00, #00ff88, #0066ff, #ff00aa, #ff0033);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  animation: edgeHue 6s linear infinite;
  pointer-events: none;
}
#head-select {
  position: relative;
  z-index: 1;
  width: 100%;
  background: rgba(0,0,0,0.55);
  color: #fff;
  padding: 12px 14px;
  font-size: clamp(13px, 3.5vw, 15px);
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="matrix-bg"></canvas>
<div id="container3D"></div>

<div id="loading">loading</div>

<div id="ui-wrapper">
  <button id="music-toggle" class="btn">Music Off</button>
  <button id="navigate-to-main" class="btn">Main Page</button>
</div>

<audio id="background-music" loop>
  <source src="https://github.com/erocshgih/lightninghornunicorn/raw/main/unison_unicorns.ogg" type="audio/ogg">
</audio>

<div id="head-menu">
<div class="btn-edge">
<select id="head-select">
  <option value="https://raw.githubusercontent.com/erocshgih/lightninghornunicorn/main/unibrowserloadicorn.glb">
    unibrowserloadicorn
  </option>
  <option value="https://raw.githubusercontent.com/erocshgih/lightninghornunicorn/main/uniturnoeyeballhorn.glb">
    uniturnoeyeballhorn
  </option>
  <option value="https://raw.githubusercontent.com/erocshgih/lightninghornunicorn/main/duckybulbywaterhorn.glb">
    duckybulbywaterhorn
  </option>
</select>
</div>
</div>

<!-- MATRIX -->
<script>
const canvas = document.getElementById("matrix-bg");
const ctx = canvas.getContext("2d");
let symbols = [];
const COUNT = 120;

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

function spawn() {
  return {
    x: Math.random() * canvas.width,
    y: canvas.height + Math.random() * canvas.height,
    speed: 0.3 + Math.random() * 0.6
  };
}

for (let i = 0; i < COUNT; i++) symbols.push(spawn());

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#8fd9fb";
  ctx.font = "20px monospace";
  for (let s of symbols) {
    s.y -= s.speed;
    if (s.y < -20) Object.assign(s, spawn());
    ctx.fillText("7", s.x, s.y);
  }
  requestAnimationFrame(draw);
}
draw();
</script>

<!-- THREE -->
<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

/* LOADING ANIMATION */
const loadingEl = document.getElementById("loading");
const baseText = "loading";
let loadingInterval; // Variable global für diesen Scope deklarieren

function startLoading() {
  loadingEl.style.display = "flex";
  let dotIndex = 0;
  
  // Sicherheitshalber ein evtl. laufendes Interval löschen
  if (loadingInterval) clearInterval(loadingInterval);
  
  // Interval neu starten
  loadingInterval = setInterval(() => {
    const chars = baseText.split("");
    chars.splice(dotIndex, 0, ".");
    loadingEl.textContent = chars.join("");
    dotIndex = (dotIndex + 1) % (baseText.length + 1);
  }, 180);
}

function stopLoading() {
  clearInterval(loadingInterval);
  loadingEl.style.display = "none";
}

/* SCENE */
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(2.6, 0, 2.6);

/* RENDERER (PS2: moderate internal res, smooth upscale, AA on) */
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
function sizeRenderer() {
  const lw = Math.max(320, Math.round(innerWidth / 3));
  const lh = Math.round(lw * (innerHeight / innerWidth));
  renderer.setSize(lw, lh, false);
}
sizeRenderer();
renderer.setPixelRatio(1.2);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById("container3D").appendChild(renderer.domElement);

/* ENVIRONMENT */
new THREE.TextureLoader().load(
  "./assets/hdri/lhu_tropical_chrome.png",
  tex => {
    tex.mapping = THREE.EquirectangularReflectionMapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    scene.environment = tex;
  }
);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 1.3));
const key = new THREE.DirectionalLight(0xffffff, 1.8);
key.position.set(5,5,5);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 1.2);
fill.position.set(-5,2,5);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 1.0);
rim.position.set(-3,5,-5);
scene.add(rim);

/* MODEL SYSTEM (RAW URL ONLY) */
const loader = new GLTFLoader();
let object = null;
let mixer = null;
const clock = new THREE.Clock();

function disposeObject(obj) {
  obj.traverse(c => {
    if (c.isMesh) {
      c.geometry.dispose();
      if (c.material) c.material.dispose();
    }
  });
}

function loadHead(url) {
  // 1. NEU: Animation hier bei JEDEM Aufruf starten
  startLoading();

  if (object) {
    scene.remove(object);
    disposeObject(object);
    object = null;
  }

  if (mixer) {
    mixer.stopAllAction();
    mixer = null;
  }

  loader.load(
    url,
    g => {
      object = g.scene;

      object.traverse(c => {
        if (c.isMesh && c.material) {
          c.material.envMapIntensity = 1.6;
          c.material.needsUpdate = true;
        }
      });

      scene.add(object);

      if (g.animations && g.animations.length) {
        mixer = new THREE.AnimationMixer(object);
        g.animations.forEach(clip => mixer.clipAction(clip).play());
      }

      // 2. NEU: Animation sauber stoppen, wenn das Modell da ist
      stopLoading();
    }
  );
}

/* CONTROLS */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* MUSIC */
let musicOn = false;
const music = document.getElementById("background-music");
const bpm = 144;
const nodSpeed = (60 / bpm) * 0.5;

document.getElementById("music-toggle").onclick = () => {
  musicOn = !musicOn;
  musicOn ? music.play().catch(()=>{}) : music.pause();
  document.getElementById("music-toggle").textContent = musicOn ? "Music On" : "Music Off";
};

document.getElementById("navigate-to-main").onclick = () => {
  location.href = "https://erocshgih.github.io/lightninghornunicorn/LightningHornUnicorn.html";
};

/* DROPDOWN */
document.getElementById("head-select").addEventListener("change", e => {
  loadHead(e.target.value);
});

/* START (EXPLICIT RAW URL) */
loadHead(
  "https://raw.githubusercontent.com/erocshgih/lightninghornunicorn/main/unibrowserloadicorn.glb"
);

/* LOOP */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);
  controls.update();

  if (object) {
    object.rotation.y += 0.00025;
    if (musicOn) {
      const t = Date.now() * 0.001;
      object.rotation.x = Math.sin(t * (Math.PI / nodSpeed)) * 0.08;
    } else {
      object.rotation.x *= 0.9;
    }
  }

  renderer.render(scene, camera);
}
animate();

/* RESIZE */
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  sizeRenderer();
});
</script>

</body>
</html>
